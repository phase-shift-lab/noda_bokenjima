<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>野田草履の冒険島</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="game-shell">
        <div class="hud">
          <div class="hud-item">
            <span>体力</span>
            <div class="meter"><div id="healthBar" class="meter-fill health"></div></div>
          </div>
          <div class="hud-item">
            <span>配信熱量</span>
            <div class="meter"><div id="hypeBar" class="meter-fill hype"></div></div>
          </div>
          <div class="hud-stats">
            <span>スコア <strong id="scoreValue">0</strong></span>
            <span>残機 <strong id="lifeValue">4</strong></span>
            <span>日数 <strong id="dayValue">1</strong></span>
          </div>
        </div>

        <div class="canvas-wrap">
          <canvas id="gameCanvas" width="960" height="540" aria-label="ゲーム画面"></canvas>
          <div id="startOverlay" class="start-overlay">
            <div class="start-card">
              <p class="eyebrow">Noda Bokenjima</p>
              <h1>野田草履の冒険島</h1>
              <p class="lead">小さくなった主人公で3ステージを進み、Zでマグカップを投げて障害物をどかす。</p>
              <p class="note">操作: ← → 移動 / Space ジャンプ / Z マグカップ投げ</p>
              <button id="startButton" class="primary">ゲーム開始</button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="./game.js"></script>
  </body>
</html>
